<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b4c9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a4a;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#e8a87c" opacity="0.3"/>
    </pattern>
    <style>
      .banner-text-title { font-family: 'Segoe UI', sans-serif; font-size: 48px; font-weight: bold; fill: white; }
      .banner-text-subtitle { font-family: 'Segoe UI', sans-serif; font-size: 20px; fill: #e8a87c; }
    </style>
  </defs>
  
  <!-- Fondo gradiente -->
  <rect width="1200" height="400" fill="url(#bannerGradient)"/>
  
  <!-- Patrón de puntos -->
  <rect width="1200" height="400" fill="url(#dots)"/>
  
  <!-- Formas geométricas decorativas -->
  <circle cx="100" cy="100" r="80" fill="#e8a87c" opacity="0.1"/>
  <circle cx="1100" cy="300" r="120" fill="#ffffff" opacity="0.05"/>
  <polygon points="600,50 700,150 500,150" fill="#e8a87c" opacity="0.08"/>
  
  <!-- Texto -->
  <text class="banner-text-title" x="600" y="180" text-anchor="middle">Bienvenido</text>
  <text class="banner-text-subtitle" x="600" y="250" text-anchor="middle">Tu Sitio Profesional</text>
  
  <!-- Línea decorativa -->
  <line x1="400" y1="280" x2="800" y2="280" stroke="#e8a87c" stroke-width="2" opacity="0.5"/>
</svg>
